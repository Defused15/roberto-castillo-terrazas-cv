name: "Jest Report"
description: "Generates Jest JSON + coverage report, uploads coverage artifact, and pushes report to QA Hub. Does not assert test results — check separately."

inputs:
  hub_token:
    description: "GitHub token with write access to the hub repo"
    required: true
  hub_repo:
    description: "Hub repo in format owner/repo"
    required: true
  project_name:
    description: "Project name used as folder key in the hub"
    required: true

runs:
  using: "composite"
  steps:
    - name: Export Jest JSON report
      shell: bash
      run: mkdir -p jest-report && npx jest --coverage --json --outputFile=jest-report/report.json
      continue-on-error: true

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage/
        retention-days: 7

    - name: Push report to QA Hub
      if: always()
      shell: bash
      env:
        HUB_TOKEN: ${{ inputs.hub_token }}
        HUB_REPO: ${{ inputs.hub_repo }}
        PROJECT_NAME: ${{ inputs.project_name }}
      run: |
        if [ ! -f ./jest-report/report.json ]; then
          echo "❌ report.json not found, cannot upload to hub"
          exit 1
        fi

        CONTENT=$(base64 -w0 ./jest-report/report.json)
        SHA=$(GH_TOKEN=$HUB_TOKEN gh api "repos/$HUB_REPO/contents/projects/$PROJECT_NAME/latest.json" \
          --jq '.sha' 2>/dev/null || echo "")

        if [ -n "$SHA" ]; then
          GH_TOKEN=$HUB_TOKEN gh api "repos/$HUB_REPO/contents/projects/$PROJECT_NAME/latest.json" \
            --method PUT \
            -f message="chore: update $PROJECT_NAME report" \
            -f content="$CONTENT" \
            -f sha="$SHA"
        else
          GH_TOKEN=$HUB_TOKEN gh api "repos/$HUB_REPO/contents/projects/$PROJECT_NAME/latest.json" \
            --method PUT \
            -f message="chore: update $PROJECT_NAME report" \
            -f content="$CONTENT"
        fi

        echo "✅ Report pushed to hub"
