name: "Jest Report"
description: "Generates Jest JSON report, uploads coverage artifact, and pushes to QA Hub. Does not assert test results — check separately."

inputs:
  hub_token:
    description: "GitHub token with write access to the hub repo"
    required: true
  hub_repo:
    description: "Hub repo in format owner/repo"
    required: true
  project_name:
    description: "Project name used as folder key in the hub"
    required: true

runs:
  using: "composite"
  steps:
    - name: Export Jest JSON report
      shell: bash
      run: mkdir -p jest-report && npx jest --json --outputFile=jest-report/report.json
      continue-on-error: true

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage/
        retention-days: 7

    - name: Push report to QA Hub
      if: always()
      shell: bash
      env:
        HUB_TOKEN: ${{ inputs.hub_token }}
        HUB_REPO: ${{ inputs.hub_repo }}
        PROJECT_NAME: ${{ inputs.project_name }}
      run: |
        node -e "
          const fs    = require('fs');
          const https = require('https');

          const reportPath = './jest-report/report.json';
          if (!fs.existsSync(reportPath)) {
            console.error('❌  report.json not found, cannot upload to hub');
            process.exit(1);
          }

          const content = fs.readFileSync(reportPath).toString('base64');
          const token   = process.env.HUB_TOKEN;
          const repo    = process.env.HUB_REPO;
          const project = process.env.PROJECT_NAME;
          const apiPath = '/repos/' + repo + '/contents/projects/' + project + '/latest.json';

          const headers = {
            'Authorization': 'Bearer ' + token,
            'Accept':        'application/vnd.github+json',
            'User-Agent':    'qa-hub'
          };

          const getReq = https.request(
            { hostname: 'api.github.com', path: apiPath, method: 'GET', headers },
            res => {
              let data = '';
              res.on('data', c => data += c);
              res.on('end', () => {
                let sha = '';
                try { sha = JSON.parse(data).sha || ''; } catch {}

                const body = JSON.stringify({
                  message: 'chore: update ' + project + ' report',
                  content,
                  ...(sha ? { sha } : {})
                });

                const putReq = https.request(
                  {
                    hostname: 'api.github.com',
                    path: apiPath,
                    method: 'PUT',
                    headers: { ...headers, 'Content-Type': 'application/json', 'Content-Length': Buffer.byteLength(body) }
                  },
                  r => {
                    let out = '';
                    r.on('data', c => out += c);
                    r.on('end', () => {
                      if (r.statusCode === 200 || r.statusCode === 201) {
                        console.log('✅  Report pushed to hub (HTTP ' + r.statusCode + ')');
                      } else {
                        console.error('❌  Hub upload failed (HTTP ' + r.statusCode + ')');
                        console.error(out);
                        process.exit(1);
                      }
                    });
                  }
                );
                putReq.write(body);
                putReq.end();
              });
            }
          );
          getReq.end();
        "

