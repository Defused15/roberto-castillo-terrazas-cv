name: CI

on:
  push:
    branches: [dev]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage and JSON output
        run: jest --json --outputFile=jest-report.json --coverage
        continue-on-error: true

      - name: Jest Report & Push to QA Hub
        uses: ./.github/actions/jest-report-hub
        with:
          hub_token: ${{ secrets.HUB_TOKEN }}
          hub_repo: Defused15/test-hub
          project_name: roberto-castillo-terrazas-cv

      - name: Generate Jest dashboard
        run: npm run dashboard:build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: reports/

  deploy-dashboard:
    name: Deploy Dashboard to GitHub Pages
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/dev'
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  mutation:
    name: Mutation Testing
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Stryker mutation tests
        run: npx stryker run

      - name: Upload mutation report
        uses: actions/upload-artifact@v4
        with:
          name: mutation-report
          path: reports/mutation/
          retention-days: 7
