name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Jest Report & Push to QA Hub
        uses: ./.github/actions/jest-report-hub
        with:
          hub_token: ${{ secrets.HUB_TOKEN }}
          hub_repo: Defused15/test-hub
          project_name: roberto-castillo-terrazas-cv

      - name: Check test results
        shell: bash
        run: |
          if [ -f ./jest-report/report.json ]; then
            FAILED=$(node -e "
              const r = JSON.parse(require('fs').readFileSync('./jest-report/report.json'));
              console.log(r.numFailedTests ?? 0);
            ")
            if [ "$FAILED" -gt "0" ]; then
              echo "❌ $FAILED test(s) failed"
              exit 1
            fi
          fi

      - name: Generate Jest dashboard
        if: github.ref == 'refs/heads/main'
        run: node generate-jest-dashboard.mjs --json ./jest-report/report.json --html ./reports/jest-dashboard.html

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: reports/

  deploy-dashboard:
    name: Deploy Dashboard to GitHub Pages
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  mutation:
    name: Mutation Testing
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Stryker mutation tests
        run: npx stryker run

      - name: Upload mutation report
        uses: actions/upload-artifact@v4
        with:
          name: mutation-report
          path: reports/mutation/
          retention-days: 7
